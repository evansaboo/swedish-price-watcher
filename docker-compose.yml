services:
  app:
    build: .
    restart: unless-stopped
    ports:
      - "${PORT:-3000}:3000"
    environment:
      - PORT=3000
      - FLARESOLVERR_URL=http://flaresolverr:8191
      - DISCORD_WEBHOOK_URL=${DISCORD_WEBHOOK_URL:-}
      - APIFY_TOKEN=${APIFY_TOKEN:-}
      - SCRAPERAPI_KEY=${SCRAPERAPI_KEY:-}
      - SCRAPFLY_API_KEY=${SCRAPFLY_API_KEY:-}
      - GG_DEALS_API_KEY=${GG_DEALS_API_KEY:-}
      - RUN_ON_START=${RUN_ON_START:-true}
      - SCAN_INTERVAL_MINUTES=${SCAN_INTERVAL_MINUTES:-180}
      - MINIMUM_DISCOUNT_PERCENT=${MINIMUM_DISCOUNT_PERCENT:-10}
      - MINIMUM_PROFIT_SEK=${MINIMUM_PROFIT_SEK:-50}
      - MAX_HISTORY_ENTRIES=${MAX_HISTORY_ENTRIES:-20}
    volumes:
      - ./data:/app/data
      - ./config:/app/config
    depends_on:
      - flaresolverr
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:3000/api/status').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 30s

  flaresolverr:
    image: ghcr.io/flaresolverr/flaresolverr:latest
    restart: unless-stopped
    environment:
      - LOG_LEVEL=info
      - LOG_HTML=false
      - CAPTCHA_SOLVER=none
