# Nixpacks build config for Railway.
# Adds system packages required by Playwright's headless Chromium.
[phases.setup]
nixPkgs = [
  "nodejs_20",
  "nss",
  "nspr",
  "expat",
  "glib",
  "glibc",
  "cairo",
  "pango",
  "dbus",
  "atk",
  "cups",
  "libdrm",
  "libxkbcommon",
  "alsa-lib",
  "mesa",
  "libgbm",
  "wayland",
  "at-spi2-core",
  "xorg.libX11",
  "xorg.libXcomposite",
  "xorg.libXdamage",
  "xorg.libXext",
  "xorg.libXfixes",
  "xorg.libXrandr",
  "xorg.libxcb",
]
