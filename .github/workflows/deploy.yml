name: Deploy to Raspberry Pi

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy
    runs-on: [self-hosted, raspberry-pi]
    steps:
      - name: Pull latest code
        run: |
          cd ~/swedish-price-watcher
          git pull origin main

      - name: Install dependencies
        run: |
          cd ~/swedish-price-watcher
          npm install --silent --no-audit

      - name: Restart service
        run: sudo systemctl restart swedish-price-watcher

      - name: Health check
        run: |
          sleep 4
          curl -sf http://localhost:3030/health | grep -q '"ok":true' && echo "✅ Deploy successful" || (echo "❌ Health check failed" && exit 1)
