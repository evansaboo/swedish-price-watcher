name: Deploy to Raspberry Pi

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    steps:
      - name: Trigger deploy webhook on Pi
        run: |
          echo "Triggering deploy on Pi via webhook..."
          RESPONSE=$(curl -sf -X POST \
            "https://deals.evansaboo.com/api/deploy?secret=${{ secrets.DEPLOY_SECRET }}" \
            --max-time 15 \
            -H "Content-Type: application/json")
          echo "Response: $RESPONSE"

      - name: Wait for Pi to restart and pass health check
        run: |
          echo "Waiting for Pi to pull, restart, and become healthy..."
          sleep 20
          for i in $(seq 1 18); do
            sleep 5
            STATUS=$(curl -sf --max-time 5 https://deals.evansaboo.com/health 2>/dev/null || echo "")
            if echo "$STATUS" | grep -q '"ok":true'; then
              echo "✅ Deploy successful (attempt $i)"
              exit 0
            fi
            echo "Waiting... ($i/18)"
          done
          echo "❌ Health check failed after 110s"
          exit 1
