name: Deploy to Raspberry Pi

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy
    runs-on: [self-hosted, raspberry-pi]
    steps:
      - name: Pull latest code
        run: |
          cd ~/swedish-price-watcher
          git pull origin main

      - name: Install dependencies
        run: |
          cd ~/swedish-price-watcher
          npm install --silent --no-audit

      - name: Restart service
        run: sudo systemctl restart swedish-price-watcher

      - name: Health check
        run: |
          # Wait up to 30s for the app to bind (it loads state before listening)
          for i in $(seq 1 10); do
            sleep 3
            if curl -sf http://localhost:3030/health | grep -q '"ok":true'; then
              echo "✅ Deploy successful"
              exit 0
            fi
            echo "Waiting for app... ($i/10)"
          done
          echo "❌ Health check failed after 30s"
          exit 1
